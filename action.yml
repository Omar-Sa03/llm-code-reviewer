name: "LLM Code Reviewer"
description: "An automated code review tool that uses LLMs to review PR diffs."
author: "Omar-Sa03"

inputs:
  hf_token:
    description: "Hugging Face API token"
    required: true
  model:
    description: "Hugging Face model to use"
    required: false
    default: "Qwen/Qwen2.5-Coder-32B-Instruct"
  max_comments:
    description: "Maximum number of comments posted across the entire PR"
    required: false
    default: "8"
  max_comments_per_file:
    description: "Maximum number of comments posted on any single file"
    required: false
    default: "3"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Reviewer
      shell: bash
      env:
        HF_TOKEN: ${{ inputs.hf_token }}
        MODEL_NAME: ${{ inputs.model }}
        MAX_COMMENTS_TOTAL: ${{ inputs.max_comments }}
        MAX_COMMENTS_PER_FILE: ${{ inputs.max_comments_per_file }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_SHA: ${{ github.event.pull_request.head.sha }}
        PYTHONPATH: ${{ github.action_path }}
      run: python -m reviewer.main

